<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: {{ width }}px;
    height: {{ height }}px;
    font-family: system-ui, -apple-system, sans-serif;
    background: {{ slide.background_color }};
    color: {{ slide.text_color }};
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
  }
  .accent-bar {
    width: 60px;
    height: 6px;
    background: linear-gradient(90deg, #6C63FF, #3ECFCF);
    border-radius: 3px;
    margin-bottom: 40px;
  }
  .slide-number {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 24px;
  }
  .title {
    font-size: 64px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 40px;
  }
  .body {
    font-size: 32px;
    font-weight: 400;
    line-height: 1.6;
    opacity: 0.8;
    max-width: 820px;
  }
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bu-tag {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.35;
  }
  .progress {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.2;
  }
  .dot.active { opacity: 1; background: #6C63FF; }
</style>
</head>
<body>
  <div>
    <div class="slide-number">{{ "%02d"|format(slide.index + 1) }} / {{ "%02d"|format(total) }}</div>
    <div class="accent-bar"></div>
    {% if slide.title %}
    <div class="title">{{ slide.title }}</div>
    {% endif %}
    <div class="body">{{ slide.body }}</div>
  </div>
  <div class="footer">
    <div class="bu-tag">{{ bu }}</div>
    <div class="progress">
      {% for i in range(total) %}
      <div class="dot {% if i == slide.index %}active{% endif %}"></div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
